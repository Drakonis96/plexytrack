<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlexyTrack - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="PlexyTrack" class="login-logo">
        <h1>PlexyTrack</h1>
        <p class="login-subtitle">Sign in to continue</p>
      </div>

      {% if error %}
      <div class="status-message error" style="margin-bottom: 16px;">{{ error }}</div>
      {% endif %}

      <form method="post" class="login-form" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" class="form-input" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" required autocomplete="current-password">
        </div>
        <button type="submit" class="button primary login-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          Sign In
        </button>
      </form>

      <footer class="login-footer">
        <p>{{ app_version }} &mdash; MIT License</p>
      </footer>
    </div>
  </div>

  <script>
    (function() {
      const THEME_KEY = 'plexytrack-theme';
      function getPreferredTheme() {
        const stored = localStorage.getItem(THEME_KEY);
        if (stored) return stored;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', getPreferredTheme());
    })();
  </script>
</body>
</html>
