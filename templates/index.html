<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlexyTrack - Sync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="PlexyTrack" class="logo">
        <span>PlexyTrack</span>
      </div>
      <nav class="sidebar-nav">
        <a href="{{ url_for('index') }}" class="nav-link active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/><path d="M22 11.5A10 10 0 0 0 3.2 7.2"/><path d="M2 12.5a10 10 0 0 0 18.8 4.3"/></svg>
          Sync
        </a>
        <a href="{{ url_for('migration_page') }}" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 8 4 4-4 4"/><path d="M2 12h20"/><path d="m6 16-4-4 4-4"/></svg>
          Migration
        </a>
        <a href="{{ url_for('backup_page') }}" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V4c0-.5.2-1 .6-1.4C5 2.2 5.5 2 6 2h8.5L20 7.5V20c0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6h-2"/><polyline points="14 2 14 8 20 8"/><path d="m3 15 2 2 4-4"/><path d="m3 21 2-2"/></svg>
          Backup
        </a>
        <a href="{{ url_for('config_page') }}" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Tracker Login
        </a>
        <a href="{{ url_for('users_page') }}" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Plex Login
        </a>
        <a href="{{ url_for('oauth_index') }}" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          OAuth
        </a>
        <a href="{{ url_for('settings_page') }}" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          Settings
        </a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main -->
    <div class="main-wrapper">
      <header class="top-header">
        <div class="top-header-left">
          <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          </button>
          <h1 class="page-title">Sync</h1>
        </div>
        <div class="top-header-right">
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
          <button id="logoutBtn" class="btn-logout">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            Log Out
          </button>
        </div>
      </header>

      <main class="content-area">
        <!-- Selected User -->
        <section class="selected-user-section card">
          <h2>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Selected User
          </h2>
          <div id="selectedUserInfo" class="selected-user-info">
            <div class="loading-message">Loading user information...</div>
          </div>
        </section>

        <!-- Sync Settings -->
        <section class="sync-settings card">
          <h2>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            Sync Settings
          </h2>
          <form method="post" class="sync-form">
            <div class="form-group">
              <label for="minutes">Sync Interval (minutes)</label>
              <input type="number" id="minutes" name="minutes" min="1" value="{{ minutes }}" class="form-input">
            </div>

            <fieldset class="sync-options">
              <legend>Sync Options</legend>
              <div class="checkbox-group">
                <input type="checkbox" id="collection" name="collection" {% if collection %}checked{% endif %} {% if provider == 'simkl' %}disabled{% endif %}>
                <label for="collection">Collection</label>
                <select id="collection_direction" name="collection_direction" class="direction-select">
                  <option value="both" {% if collection_direction == 'both' %}selected{% endif %}>Bidirectional</option>
                  <option value="plex_to_service" {% if collection_direction == 'plex_to_service' %}selected{% endif %}>Plex → {{ provider.capitalize() }}</option>
                  <option value="service_to_plex" {% if collection_direction == 'service_to_plex' %}selected{% endif %}>{{ provider.capitalize() }} → Plex</option>
                </select>
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="ratings" name="ratings" {% if ratings %}checked{% endif %}>
                <label for="ratings">Ratings</label>
                <select id="ratings_direction" name="ratings_direction" class="direction-select">
                  <option value="both" {% if ratings_direction == 'both' %}selected{% endif %}>Bidirectional</option>
                  <option value="plex_to_service" {% if ratings_direction == 'plex_to_service' %}selected{% endif %}>Plex → {{ provider.capitalize() }}</option>
                  <option value="service_to_plex" {% if ratings_direction == 'service_to_plex' %}selected{% endif %}>{{ provider.capitalize() }} → Plex</option>
                </select>
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="watched" name="watched" {% if watched %}checked{% endif %}>
                <label for="watched">Watched History</label>
                <select id="history_direction" name="history_direction" class="direction-select">
                  <option value="both" {% if history_direction == 'both' %}selected{% endif %}>Bidirectional</option>
                  <option value="plex_to_service" {% if history_direction == 'plex_to_service' %}selected{% endif %}>Plex → {{ provider.capitalize() }}</option>
                  <option value="service_to_plex" {% if history_direction == 'service_to_plex' %}selected{% endif %}>{{ provider.capitalize() }} → Plex</option>
                </select>
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="liked_lists" name="liked_lists" {% if liked_lists %}checked{% endif %} {% if provider == 'simkl' %}disabled{% endif %}>
                <label for="liked_lists">Liked Lists</label>
                <select id="lists_direction" name="lists_direction" class="direction-select">
                  <option value="both" {% if lists_direction == 'both' %}selected{% endif %}>Bidirectional</option>
                  <option value="plex_to_service" {% if lists_direction == 'plex_to_service' %}selected{% endif %}>Plex → {{ provider.capitalize() }}</option>
                  <option value="service_to_plex" {% if lists_direction == 'service_to_plex' %}selected{% endif %}>{{ provider.capitalize() }} → Plex</option>
                </select>
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="watchlists" name="watchlists" {% if watchlists %}checked{% endif %} {% if provider == 'simkl' %}disabled{% endif %}>
                <label for="watchlists">Watchlists</label>
                <select id="watchlists_direction" name="watchlists_direction" class="direction-select">
                  <option value="both" {% if watchlists_direction == 'both' %}selected{% endif %}>Bidirectional</option>
                  <option value="plex_to_service" {% if watchlists_direction == 'plex_to_service' %}selected{% endif %}>Plex → {{ provider.capitalize() }}</option>
                  <option value="service_to_plex" {% if watchlists_direction == 'service_to_plex' %}selected{% endif %}>{{ provider.capitalize() }} → Plex</option>
                </select>
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="live_sync" name="live_sync" {% if live_sync %}checked{% endif %}>
                <label for="live_sync">Live Sync</label>
              </div>
            </fieldset>

            <div class="form-actions">
              <button type="submit" id="scheduleBtn" class="button primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
                Schedule Sync
              </button>
              <button type="submit" formaction="{{ url_for('sync_once') }}" id="syncOnceBtn" class="button primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Sync Once
              </button>
            </div>
          </form>
          <form method="post" action="{{ url_for('stop') }}" class="stop-form">
            <button type="submit" id="stopBtn" class="button secondary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
              Stop Sync
            </button>
          </form>
        </section>

        {% if next_run %}
        <div class="status-message info">Next sync scheduled for: {{ next_run }}</div>
        {% endif %}

        <div id="confirmationMessage" class="status-message {% if mtype == 'success' %}success{% elif mtype == 'stopped' %}error{% elif mtype == 'error' %}error{% endif %}" {% if not message %}style="display:none;"{% endif %}>
          {{ message }}
        </div>
      </main>

      <footer class="app-footer">
        <p>{{ app_version }} &mdash; MIT License. By <a href="https://github.com/Drakonis96" target="_blank" rel="noopener">Drakonis96</a></p>
      </footer>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script>
    async function loadSelectedUser() {
      try {
        const response = await fetch('/api/get_selected_user');
        const data = await response.json();
        const selectedUserInfo = document.getElementById('selectedUserInfo');

        if (data.success && data.user) {
          const user = data.user;
          let warningHTML = '';

          if (!user.is_owner || user.role === 'managed user') {
            warningHTML = `
              <div class="warning-box mt-3">
                <strong>Managed User Limitation:</strong> Sync will only work from Plex → ${user.role === 'managed user' ? 'Trakt/Simkl' : 'external service'}.
                Items from external services will NOT be marked as watched in Plex for this user.
              </div>`;
          }

          selectedUserInfo.innerHTML = `
            <div class="user-card">
              <div class="user-info">
                <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                <div class="user-details">
                  <h3>${user.username}</h3>
                  <span class="user-role">${user.role}</span>
                </div>
              </div>
              <a href="/users" class="btn-select-user">Change User</a>
            </div>
            <div class="text-center text-muted text-sm mt-2">
              Sync will be performed for this user ${user.role === 'managed user' ? '(using scrobble)' : '(direct marking)'}
            </div>
            ${warningHTML}`;

          updateSyncOptionsForUser(user);
        } else {
          selectedUserInfo.innerHTML = `
            <div class="no-user-selected">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted);margin-bottom:12px"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <h3>No User Selected</h3>
              <p class="text-sm mb-3">Please select a user to perform sync operations.</p>
              <a href="/users" class="btn-select-user">Select User</a>
            </div>`;
          updateSyncOptionsForUser(null);
        }
      } catch (error) {
        document.getElementById('selectedUserInfo').innerHTML = `
          <div class="no-user-selected">
            <div style="color:var(--danger)">Error loading user information</div>
          </div>`;
      }
    }

    function updateSyncOptionsForUser(user) {
      const restrictedOptions = ['collection', 'liked_lists', 'watchlists'];
      const directionOptions = ['history_direction','lists_direction','watchlists_direction','ratings_direction','collection_direction'];
      const isManagedUser = user && !user.is_owner;

      restrictedOptions.forEach(option => {
        const checkbox = document.getElementById(option);
        const label = document.querySelector(`label[for="${option}"]`);
        if (checkbox) {
          if (isManagedUser) {
            checkbox.disabled = true;
            checkbox.checked = false;
            if (label) { label.style.opacity = '0.5'; label.style.cursor = 'not-allowed'; }
          } else {
            const isProviderDisabled = checkbox.hasAttribute('data-provider-disabled');
            if (!isProviderDisabled) {
              checkbox.disabled = false;
              if (label) { label.style.opacity = '1'; label.style.cursor = 'pointer'; }
            }
          }
        }
      });

      directionOptions.forEach(opt => {
        const select = document.getElementById(opt);
        if (select) {
          if (isManagedUser) { select.disabled = true; select.value = 'plex_to_service'; }
          else { select.disabled = false; }
        }
      });

      const syncOptions = document.querySelector('.sync-options');
      if (syncOptions) {
        const existingNote = syncOptions.querySelector('.managed-user-note');
        if (existingNote) existingNote.remove();
        if (isManagedUser) {
          const note = document.createElement('div');
          note.className = 'managed-user-note warning-box mt-3';
          note.innerHTML = '<strong>Note:</strong> Collection, Liked Lists, and Watchlists are disabled for managed users.';
          syncOptions.appendChild(note);
        }
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadSelectedUser();
      document.querySelectorAll('input[type="checkbox"][disabled]').forEach(cb => {
        cb.setAttribute('data-provider-disabled', 'true');
      });
    });

    const msg = document.getElementById('confirmationMessage');
    if (msg && msg.textContent.trim() !== '') {
      setTimeout(function() { msg.style.display = 'none'; }, 5000);
    }
  </script>
</body>
</html>
